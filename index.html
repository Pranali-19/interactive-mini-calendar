<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enhanced Mini Calendar</title> 

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.calendar{
  background:#fff;
  width:280px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
  transition:0.3s;
}

.calendar:hover{
  transform:scale(1.05);
}

.header{
  background:#4a00e0;
  color:#fff;
  padding:20px;
}

.month{
  font-size:20px;
  font-weight:600;
}

.day{
  font-size:14px;
  opacity:0.8;
}

.date{
  font-size:70px;
  font-weight:700;
  margin:10px 0;
  color:#4a00e0;
}

.year{
  font-size:16px;
  color:#666;
  margin-bottom:10px;
}

.footer{
  padding:15px;
}

.btn{
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#4a00e0;
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#2575fc;
}

.dark-mode{
  background:#1e1e2f;
  color:#fff;
}

.dark-mode .calendar{
  background:#2a2a40;
}

.dark-mode .date{
  color:#00c6ff;
}

</style>
</head>

<body>

<div class="calendar" id="calendar">
  <div class="header">
    <div class="month" id="month"></div>
    <div class="day" id="day"></div>
  </div>
  <div class="date" id="date"></div>
  <div class="year" id="year"></div>

  <div class="footer">
    <button class="btn" onclick="prevDay()">◀</button>
    <button class="btn" onclick="nextDay()">▶</button>
    <button class="btn" onclick="toggleDark()">🌙</button>
  </div>
</div>

<script>
let currentDate = new Date();

function updateCalendar(){
  document.getElementById('month').innerText = currentDate.toLocaleString('en',{month:'long'});
  document.getElementById('day').innerText = currentDate.toLocaleString('en',{weekday:'long'});
  document.getElementById('date').innerText = currentDate.getDate();
  document.getElementById('year').innerText = currentDate.getFullYear();
}

function nextDay(){
  currentDate.setDate(currentDate.getDate()+1);
  updateCalendar();
}

function prevDay(){
  currentDate.setDate(currentDate.getDate()-1);
  updateCalendar();
}

function toggleDark(){
  document.body.classList.toggle('dark-mode');
}

// Initial Load
updateCalendar();
</script>

</body>
</html> -->
